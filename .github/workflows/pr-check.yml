name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: engine/pyproject.toml

      - name: Install dependencies
        working-directory: engine
        run: pip install -e ".[dev]"

      - name: All tests with coverage
        working-directory: engine
        run: |
          python -m pytest tests/ \
            --cov=notas_lave \
            --cov-report=term-missing \
            --cov-fail-under=35 \
            -x -q --tb=short

      - name: Detect silently skipped tests
        working-directory: engine
        run: |
          OUTPUT=$(python -m pytest tests/ -v --no-header 2>&1)
          SKIPPED=$(echo "$OUTPUT" | grep -c "SKIPPED" || true)
          echo "Skipped tests: $SKIPPED"
          if [ "$SKIPPED" -gt 3 ]; then
            echo "::error::$SKIPPED tests were skipped"
            echo "$OUTPUT" | grep "SKIPPED"
            exit 1
          fi
