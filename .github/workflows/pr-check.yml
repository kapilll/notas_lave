name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: engine/pyproject.toml

      - name: Install dependencies
        working-directory: engine
        run: pip install -e ".[dev]"

      - name: All tests with coverage
        working-directory: engine
        run: |
          python -m pytest tests/ \
            --cov=notas_lave \
            --cov-report=term-missing \
            --cov-fail-under=34 \
            -x -q --tb=short

      - name: Detect silently skipped tests
        working-directory: engine
        run: |
          OUTPUT=$(python -m pytest tests/ -v --no-header 2>&1)
          SKIPPED=$(echo "$OUTPUT" | grep -c "SKIPPED" || true)
          echo "Skipped tests: $SKIPPED"
          if [ "$SKIPPED" -gt 3 ]; then
            echo "::error::$SKIPPED tests were skipped"
            echo "$OUTPUT" | grep "SKIPPED"
            exit 1
          fi

      - name: Check version was bumped
        run: |
          VERSION=$(grep '^version' engine/pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          # Check if this version tag already exists (means version wasn't bumped)
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "::error::pyproject.toml version ${VERSION} already has a release tag (v${VERSION}). Bump the version!"
            exit 1
          fi
          echo "Version ${VERSION} has no existing tag — OK"
