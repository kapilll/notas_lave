name: Test → Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Tests with coverage gate ───────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: engine/pyproject.toml

      - name: Install dependencies
        working-directory: engine
        run: pip install -e ".[dev]"

      - name: All tests with coverage
        working-directory: engine
        run: |
          python -m pytest tests/ \
            --cov=notas_lave \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=35 \
            -x -q --tb=short

      - name: Detect silently skipped tests
        working-directory: engine
        run: |
          OUTPUT=$(python -m pytest tests/ -v --no-header 2>&1)
          SKIPPED=$(echo "$OUTPUT" | grep -c "SKIPPED" || true)
          echo "Skipped tests: $SKIPPED"
          if [ "$SKIPPED" -gt 3 ]; then
            echo "::error::$SKIPPED tests were skipped — review before deploying"
            echo "$OUTPUT" | grep "SKIPPED"
            exit 1
          fi

  # ── Deploy to VM (no Docker) ──────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/notas_lave

            # Save rollback point
            git rev-parse HEAD > /tmp/notas_lave_rollback_sha

            # Pull latest
            git pull origin main

            # Update engine deps
            source ~/.venv-notas/bin/activate
            pip install -q . 2>&1 | tail -1

            # Rebuild dashboard
            cd ~/notas_lave/dashboard
            npm install --silent 2>&1 | tail -1
            npm run build 2>&1 | tail -1

            # Restart services
            sudo systemctl restart notas-engine
            sleep 3
            sudo systemctl restart notas-dashboard

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            for i in $(seq 1 15); do
              HEALTH=$(curl -sf http://127.0.0.1:8000/health 2>/dev/null || true)
              if echo "$HEALTH" | grep -q '"ok"'; then
                echo "Engine healthy after ${i}s: $HEALTH"
                echo "Deploy verified at $(date)"
                exit 0
              fi
              sleep 2
            done
            echo "Engine failed health check after 30s"
            sudo journalctl -u notas-engine --no-pager -n 30
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/notas_lave
            ROLLBACK_SHA=$(cat /tmp/notas_lave_rollback_sha 2>/dev/null)
            if [ -n "$ROLLBACK_SHA" ]; then
              echo "Rolling back to $ROLLBACK_SHA"
              git checkout "$ROLLBACK_SHA"
              source ~/.venv-notas/bin/activate
              pip install -q . 2>&1 | tail -1
              sudo systemctl restart notas-engine
              sudo systemctl restart notas-dashboard
              echo "Rollback complete at $(date)"
            fi

  # ── Notify ─────────────────────────────────────────────────
  notify:
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          TEST_STATUS="${{ needs.test.result }}"

          if [ "$DEPLOY_STATUS" = "success" ]; then
            MSG="[DEPLOY] $COMMIT_MSG ($COMMIT_SHA) deployed successfully"
          elif [ "$TEST_STATUS" = "failure" ]; then
            MSG="[DEPLOY BLOCKED] Tests failed for $COMMIT_SHA: $COMMIT_MSG"
          else
            MSG="[DEPLOY FAILED] $COMMIT_SHA rolled back: $COMMIT_MSG"
          fi

          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" || echo "Telegram failed (non-fatal)"
