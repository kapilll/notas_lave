name: Release → Deploy

on:
  release:
    types: [published]

jobs:
  # Tests already ran in pr-check.yml before merge.
  # No need to re-run — we deploy what was tested.

  # ── Deploy to VM ──────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/notas_lave

            # Save rollback point
            git rev-parse HEAD > /tmp/notas_lave_rollback_sha

            # Fetch and checkout the release tag
            git fetch origin --tags
            git checkout "${{ github.event.release.tag_name }}"

            # Update engine deps
            source ~/.venv-notas/bin/activate
            cd ~/notas_lave/engine
            pip install -q .

            # Pre-deploy validation: catch config errors BEFORE restarting
            python -c 'from notas_lave.execution.registry import list_brokers; import notas_lave.execution.paper, notas_lave.execution.delta, os; b=os.environ.get("BROKER","delta_testnet"); assert b in list_brokers(), f"BROKER={b} not in {list_brokers()}"; print(f"Pre-deploy OK: BROKER={b}")'

            # Build architecture diagrams into dashboard static files
            cd ~/notas_lave
            npx likec4 build -o dashboard/public/architecture --base /architecture --title "Notas Lave Architecture" --use-hash-history architecture/ 2>&1 | tail -1

            # Rebuild dashboard
            cd ~/notas_lave/dashboard
            npm install --silent 2>&1 | tail -1
            npm run build 2>&1 | tail -1

            # Restart services
            sudo systemctl restart notas-engine
            sleep 3
            sudo systemctl restart notas-dashboard

      - name: Post-deploy health + version check
        uses: appleboy/ssh-action@v1
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: RELEASE_TAG
          script: |
            EXPECTED_VERSION="${RELEASE_TAG#v}"
            for i in $(seq 1 15); do
              HEALTH=$(curl -sf http://127.0.0.1:8000/health 2>/dev/null || true)
              if echo "$HEALTH" | grep -q '"ok"'; then
                echo "Engine healthy after ${i}s"
                DEPLOYED_VERSION=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null || echo "unknown")
                echo "Deployed version: ${DEPLOYED_VERSION}"
                echo "Expected version: ${EXPECTED_VERSION}"
                if [ "$DEPLOYED_VERSION" != "$EXPECTED_VERSION" ]; then
                  echo "::warning::Version mismatch! pyproject.toml says ${DEPLOYED_VERSION} but release tag is ${RELEASE_TAG}. Update pyproject.toml!"
                fi
                exit 0
              fi
              sleep 2
            done
            echo "Engine failed health check after 30s"
            sudo journalctl -u notas-engine --no-pager -n 30
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/notas_lave
            ROLLBACK_SHA=$(cat /tmp/notas_lave_rollback_sha 2>/dev/null)
            if [ -n "$ROLLBACK_SHA" ]; then
              echo "Rolling back to $ROLLBACK_SHA"
              git checkout "$ROLLBACK_SHA"
              source ~/.venv-notas/bin/activate
              cd ~/notas_lave/engine && pip install -q .
              sudo systemctl restart notas-engine
              sudo systemctl restart notas-dashboard
              echo "Rollback complete at $(date)"
            fi

  # ── Notify ─────────────────────────────────────────────────
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping"
            exit 0
          fi

          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          COMMIT_SHA=$(git rev-parse --short HEAD)
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [ "$DEPLOY_STATUS" = "success" ]; then
            MSG="[DEPLOY] ${RELEASE_TAG} deployed — ${RELEASE_NAME}"
          else
            MSG="[DEPLOY FAILED] ${RELEASE_TAG} rolled back ($COMMIT_SHA)"
          fi

          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" || echo "Telegram failed (non-fatal)"
