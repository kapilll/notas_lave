services:
  engine:
    build: ./engine
    container_name: notas-lave-engine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # Localhost only — not exposed to internet
    volumes:
      - engine-data:/app/data
      - engine-db:/app/db
    env_file:
      - ./engine/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: ./dashboard
    container_name: notas-lave-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # Localhost only — Cloudflare Tunnel handles public access
    environment:
      - NEXT_PUBLIC_ENGINE_URL=http://engine:8000
    depends_on:
      engine:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Cloudflare Tunnel — secure access to dashboard without opening ports
  # Set up once: cloudflared tunnel create notas-lave
  # Then add CLOUDFLARE_TUNNEL_TOKEN to .env
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: notas-lave-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - dashboard
    profiles:
      - cloud   # Only starts with: docker compose --profile cloud up -d

volumes:
  engine-data:   # Logs, check-in reports, risk state
  engine-db:     # SQLite databases (trades, signals)
