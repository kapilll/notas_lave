version: "3.8"

services:
  engine:
    build: ./engine
    container_name: notas-lave-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist databases + logs across container restarts
      - engine-data:/app/data
      - ./engine/notas_lave.db:/app/notas_lave.db
      - ./engine/notas_lave_lab.db:/app/notas_lave_lab.db
    env_file:
      - ./engine/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build: ./dashboard
    container_name: notas-lave-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://engine:8000
    depends_on:
      engine:
        condition: service_healthy

volumes:
  engine-data:
